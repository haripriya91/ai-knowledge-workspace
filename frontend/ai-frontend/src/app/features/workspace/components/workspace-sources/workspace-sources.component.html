<div class="space-y-4">

  <!-- HEADER -->
  <div class="flex items-center justify-between">

    <h2 class="font-semibold text-lg">
      Sources
    </h2>

    <button
      (click)="toggleSources()"
      class="text-sm text-gray-500">
      {{ sourcesOpen ? '▾' : '▸' }}
    </button>

  </div>


  <!-- ADD BUTTON -->
  <button
    class="w-full py-2
           bg-blue-600 text-white
           rounded-full text-sm
           hover:bg-blue-700 transition">
    + Add Source
  </button>


  <!-- SOURCE LIST -->
  @if (sourcesOpen) {

    <div class="space-y-3">

      <app-source-cards
        type="pdf"
        title="Angular Signals Guide"
      />
    </div>
      
    <div class="space-y-3">
      <app-source-cards
        type="url"
        title="Blog: AI Knowledge Systems"
      />

    </div>

  }

</div>
