<div class="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center z-50">

  <div class="bg-white w-full max-w-lg rounded-2xl shadow-xl p-6 relative animate-fadeIn">

    <!-- Close button 
    <button 
      class="absolute top-4 right-4 text-gray-400 hover:text-black text-xl"
      (click)="close.emit()">
      ✕
    </button>-->

    <!-- Header -->
    <h2 class="text-2xl font-semibold mb-1">Upload Source</h2>
    <p class="text-sm text-gray-500 mb-5">
      Add a document or paste a URL
    </p>

    <!-- Name -->
    <div class="space-y-1">
      <label class="text-sm font-medium text-gray-600">Name</label>
      <input 
        type="text"
        placeholder="Optional name"
        (input)="onNameChange($event)"
        class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:outline-none"
      />
    </div>

    <!-- File -->
    <div class="space-y-1">
      <label class="text-sm font-medium text-gray-600">Upload File</label>
      <input 
        type="file"
        (change)="onFileChange($event)"
        class="w-full border border-dashed border-gray-300 rounded-lg p-3 cursor-pointer hover:border-blue-400"
      />
    </div>

    <!-- Divider -->
    <div class="flex items-center gap-3 my-3">
      <div class="flex-1 h-px bg-gray-200"></div>
      <span class="text-xs text-gray-400">OR</span>
      <div class="flex-1 h-px bg-gray-200"></div>
    </div>

    <!-- URL -->
    <div class="space-y-1">
      <label class="text-sm font-medium text-gray-600">URL</label>
      <input 
        type="text"
        placeholder="https://example.com"
        (input)="onUrlChange($event)"
        class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:outline-none"
      />
    </div>

    <!-- Error -->
    @if (error) {
      <p class="text-red-500 text-sm mt-2">{{ error }}</p>
    }

    <!-- Actions -->
    <div class="flex justify-end gap-3 mt-6">
    <!--   <button 
        class="px-4 py-2 rounded-lg border text-gray-600 hover:bg-gray-100"
        (click)="close.emit()">
        Cancel
      </button>-->

      <button 
        class="px-4 py-2 rounded-lg bg-blue-600 text-white hover:bg-blue-700 disabled:opacity-50"
        (click)="submit()">
        Upload
      </button>
    </div>

  </div>
</div>
