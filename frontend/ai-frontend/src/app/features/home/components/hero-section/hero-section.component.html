<section id="hero" class="text-center py-20 px-4">
  <h1 class="text-4xl font-bold mb-4">
    Organize Knowledge. Think Better.
  </h1>

  <p class="text-lg text-gray-600 mb-10">
    Create AI-powered workspaces to research, learn, and build ideas.
  </p>

  <!-- Slider -->
  <div class="relative max-w-lg mx-auto overflow-hidden">
    <div
      class="flex transition-transform duration-800 ease-in-out"
      [style.transform]="'translateX(-' + currentSlide * slideWidth + '%)'"
    >
      @for (slide of slides; track $index) {
        <div class="w-1/3 flex flex-col items-center gap-5 px-5 m-5">
          <img
            [src]="slide.icon"
            [alt]="slide.text"
            class="w-15 h-14"
          />
  
          <p class="text-gray-700 font-medium text-center">
            {{ slide.text }}
          </p>
        </div>
      }
    </div>
  
    <!-- Dots -->
    <div class="flex justify-center gap-2 mt-6">
      @for (dot of dots; track $index) {
        <button
          (click)="goToSlide($index)"
          class="w-3 h-3 rounded-full transition"
          [class.bg-indigo-600]="currentSlide === $index"
          [class.bg-gray-300]="currentSlide !== $index"
        ></button>
      }
    </div>
  </div>
  

  <button class="btn-primary mt-10">
    Try with public workspaces
  </button>
</section>
