<!-- ================= HERO SECTION ================= -->
<section id="hero" class="py-4 md:py-4 text-center md:px-4">
  <h1
    class="text-3xl sm:text-4xl md:text-5xl font-bold mb-4 leading-tight"
  >
    Organize Knowledge. Think Better.
  </h1>

  <p
    class="text-base sm:text-lg text-gray-600 mb-8 md:mb-10 max-w-xl md:max-w-2xl mx-auto"
  >
    Create AI-powered workspaces to research, learn, and build ideas.
  </p>

  <div class="relative max-w-7xl mx-auto px-4">
    <!-- Slider -->
    <div
      class="relative"
      (mouseenter)="pauseSlides()"
      (mouseleave)="playSlides()"
    >
      <swiper-container #swiper class="w-full">
        @for (slide of slides; track $index) {
          <swiper-slide
            class="flex flex-col items-center justify-center p-4 md:p-6"
          >
            <div
              class="w-20 h-20 sm:w-24 sm:h-24 md:w-32 md:h-32 lg:w-36 lg:h-36
                     flex items-center justify-center mb-4 md:mb-6"
            >
              <img
                [src]="slide.icon"
                [alt]="slide.text"
                class="w-full h-full object-contain" loading="lazy" width="100" height="100"
              />
            </div>

            <p
              class="text-gray-700 font-medium text-center
                     text-sm sm:text-base md:text-lg lg:text-xl
                     mt-3 md:mt-4 max-w-xs mx-auto"
            >
              {{ slide.text }}
            </p>
          </swiper-slide>
        }
      </swiper-container>
    </div>

    <!-- Controls -->
    <div class="flex justify-center items-center gap-4 mt-6 md:mt-8">
      <button
        (click)="prevSlide()"
        class="p-2 sm:p-3 rounded-full bg-gray-100 hover:bg-gray-200 transition group"
      >
        <svg
          class="w-5 h-5 sm:w-6 sm:h-6 text-gray-700 group-hover:text-indigo-600"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
        >
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M15 19l-7-7 7-7" />
        </svg>
      </button>

      @if (!isPaused) {
        <button
          (click)="pauseSlides()"
          class="p-2 sm:p-3 rounded-full bg-indigo-100 hover:bg-indigo-200 transition"
        >
          <svg
            class="w-5 h-5 sm:w-6 sm:h-6 text-indigo-600"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M10 9v6m4-6v6m7-3a9 9 0 11-18 0 9 9 0 0118 0z" />
          </svg>
        </button>
      } @else {
        <button
          (click)="playSlides()"
          class="p-2 sm:p-3 rounded-full bg-gray-100 hover:bg-gray-200 transition"
        >
          <svg
            class="w-5 h-5 sm:w-6 sm:h-6 text-gray-700"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z" />
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
          </svg>
        </button>
      }

      <button
        (click)="nextSlide()"
        class="p-2 sm:p-3 rounded-full bg-gray-100 hover:bg-gray-200 transition group"
      >
        <svg
          class="w-5 h-5 sm:w-6 sm:h-6 text-gray-700 group-hover:text-indigo-600"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
        >
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M9 5l7 7-7 7" />
        </svg>
      </button>
    </div>

    <div class="swiper-pagination relative mt-8 md:mt-8"></div>
  </div>
</section>
