<section
  id="public-workspaces"
  class="space-y-6 px-4 md:px-6 max-w-7xl mx-auto"
>
  <!-- Filters + View Toggle -->
  <div
    class="flex flex-col gap-4
           md:flex-row md:items-center md:justify-between"
  >
    <!-- Categories -->
    <div
      class="flex gap-2 overflow-x-auto pb-1 scrollbar-hide"
    >
      @for (cat of categories; track cat) {
        <button
          class="shrink-0 px-4 py-1.5 rounded-full border
                 text-sm font-medium transition"
          [class.bg-indigo-600]="selectedCategory === cat"
          [class.text-white]="selectedCategory === cat"
          [class.border-indigo-600]="selectedCategory === cat"
          [class.bg-white]="selectedCategory !== cat"
          [class.text-gray-700]="selectedCategory !== cat"
          (click)="onCategoryChange(cat)"
        >
          {{ cat }}
        </button>
      }
    </div>

    <!-- View Toggle (DESKTOP ONLY) -->
    <div class="hidden md:flex">
      <app-view-toggle
        [view]="view"
        (viewChange)="onViewChange($event)"
      ></app-view-toggle>
    </div>
  </div>

  <!-- Workspace List -->
  <app-workspace-list
    [workspaces]="filteredWorkspaces"
    [view]="effectiveView"
  ></app-workspace-list>
</section>
