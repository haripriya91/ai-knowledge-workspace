<div class="w-full max-w-md mx-auto bg-white rounded-xl shadow p-6">
    <h2 class="text-2xl font-semibold text-center mb-6">
      Create your account
    </h2>
  
    <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-4">
      <!-- Name -->
      <div>
        <label class="block text-sm font-medium mb-1">Name</label>
        <input
          type="text"
          formControlName="name"
          class="w-full rounded border px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
          placeholder="Your name"
        />
      </div>
  
      <!-- Email -->
      <div>
        <label class="block text-sm font-medium mb-1">Email</label>
        <input
          type="email"
          formControlName="email"
          class="w-full rounded border px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
          placeholder="you@example.com"
        />
      </div>
  
      <!-- Password -->
      <div>
        <label class="block text-sm font-medium mb-1">Password</label>
        <input
          type="password"
          formControlName="password"
          class="w-full rounded border px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
          placeholder="Minimum 6 characters"
        />
      </div>
  
      <!-- Error -->
      @if (error) {
        <p class="text-sm text-red-600">{{ error }}</p>
      }
  
      <!-- Submit -->
      <button
        type="submit"
        [disabled]="loading"
        class="w-full rounded-lg bg-indigo-600 text-white py-2
               hover:bg-indigo-700 transition disabled:opacity-50"
      >
        {{ loading ? 'Creating account…' : 'Sign up' }}
      </button>
    </form>
  
    <!-- Footer -->
    <p class="text-sm text-center text-gray-600 mt-4">
      Already have an account?
      <a routerLink="/auth/login" class="text-indigo-600 hover:underline">
        Log in
      </a>
    </p>
  </div>
