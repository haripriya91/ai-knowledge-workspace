<h1 class="text-2xl font-bold mb-2 text-center">
    Welcome back
  </h1>
  
  <p class="text-sm text-gray-600 text-center mb-6">
    Sign in to your workspace
  </p>
  
  <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-4">
  
    <div>
      <label class="text-sm font-medium">Email</label>
      <input
        type="email"
        formControlName="email"
        class="mt-1 w-full rounded-lg border px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500"
        placeholder="you@email.com"
      />
    </div>
  
    <div>
      <label class="text-sm font-medium">Password</label>
      <input
        type="password"
        formControlName="password"
        class="mt-1 w-full rounded-lg border px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500"
        placeholder="••••••••"
      />
    </div>
  
    <div class="flex justify-between text-sm">
      <a routerLink="/forgot-password" class="text-indigo-600 hover:underline">
        Forgot password?
      </a>
    </div>
  
    <button
      type="submit"
      [disabled]="form.invalid || loading"
      class="w-full rounded-lg bg-indigo-600 text-white py-2 font-medium hover:bg-indigo-700 transition"
    >
      Sign in
    </button>
  </form>
  
  <p class="text-sm text-center mt-6">
    Don’t have an account?
    <a routerLink="/auth/signup" class="text-indigo-600 hover:underline">
      Sign up
    </a>
  </p>
