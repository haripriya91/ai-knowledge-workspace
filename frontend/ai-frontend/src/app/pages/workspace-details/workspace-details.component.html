
<div class="md:hidden flex border-b text-sm">

  <button class="flex-1 py-2" (click)="setTab('sources')">Sources</button>
  <button class="flex-1 py-2" (click)="setTab('chat')">Chat</button>
  <button class="flex-1 py-2" (click)="setTab('ai')">AI</button>

</div>
<!-- Main container - height calculated as viewport minus header height -->
<div class="h-[calc(100vh-64px)] flex flex-col md:grid md:grid-cols-12 gap-4 md:gap-6">
    <!-- SOURCES -->
  @if (workspace) {
  <aside class="col-span-12 md:col-span-3 h-full overflow-hidden"
  [class.hidden]="activeTab() !== 'sources' && isMobile" >
    <app-workspace-sources [workspaceId]="workspaceId"
    [isPublicWorkspace]="workspace.isPublic"/>
  </aside>
}
  <!-- MAIN WORKSPACE -->
  <main
  class="col-span-12 md:col-span-8 flex flex-col h-full min-h-0"
  [class.hidden]="activeTab() !== 'chat' && isMobile">
      <!-- CHAT WORKSPACE -->
    <div class="flex flex-col flex-1 bg-gray-50 rounded-xl h-full overflow-hidden">
  
      <!-- CHAT HISTORY - THIS IS THE ONLY SCROLLABLE AREA -->
      <div class="flex-1 overflow-y-auto px-8 py-6 space-y-6 min-h-0">

        <!-- OVERVIEW -->
        <div class="max-w-3xl text-sm text-gray-700">
          <h2 class="font-semibold text-lg mb-2">
            Workspace Overview : {{ workspace?.name || 'Untitled' }}
          </h2>
          <p>{{ workspace?.description }}</p>
        </div>
      
        <!-- CHAT -->
        @for (msg of chatMessages(); track $index) {
      
          @if (msg.role === 'user') {
            <div class="flex justify-end">
              <div class="bg-blue-600 text-white rounded-2xl px-4 py-3 max-w-xl text-sm">
                <markdown [data]="msg.text"></markdown>
              </div>
            </div>
          }
      
          @if (msg.role === 'assistant') {
            <div class="max-w-3xl text-sm text-gray-800">
              <markdown [data]="msg.text"></markdown>
            </div>
          }
      
        }
      
      </div>
  
      <!-- CHAT INPUT - ALWAYS VISIBLE AT BOTTOM -->
      <div class="flex-none px-6 py-4 bg-gray-50 border-t border-gray-200">
        <div class="flex items-center gap-3 bg-white shadow-md rounded-2xl px-5 py-3 w-full max-w-3xl mx-auto">
          <input [value]="chatInput()" (input)="chatInput.set($any($event.target).value)" class="flex-1 bg-transparent outline-none text-sm" placeholder="Ask something about your sources..." />
          <button (click)="sendMessage()" class="bg-blue-600 text-white px-4 py-2 rounded-xl text-sm hover:bg-blue-700 transition">
            Send
          </button>
        </div>
  
        <p class="text-xs text-gray-400 text-center mt-2">
          Knowledge workspace can be inaccurate; please double check its responses.
        </p>
      </div>
  
    </div>
  </main>

  <!-- AI TOOLS -->
  <aside class="col-span-12 md:col-span-1"
  [class.hidden]="activeTab() !== 'ai' && isMobile">
    <app-workspace-ai-features [workspaceId]="workspaceId" (actionClicked)="handleAiAction($event)"/>
  </aside>
</div>
